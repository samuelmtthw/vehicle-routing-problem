    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0c10;
        --bg2: #111318;
        --bg3: #181c24;
        --bg4: #1f2430;
        --border: #2a2f3d;
        --border2: #363c4e;
        --text: #e8eaf0;
        --text2: #9099b0;
        --text3: #5a6278;
        --blue: #38bdf8;
        --green: #4ade80;
        --orange: #fb923c;
        --purple: #c084fc;
        --red: #f87171;
        --yellow: #fbbf24;
        --font-mono: "Space Mono", monospace;
        --font-sans: "DM Sans", sans-serif;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        min-height: 100vh;
        overflow-x: hidden;
      }
      .layout {
        display: grid;
        grid-template-columns: 272px 1fr;
        grid-template-rows: 52px 1fr;
        min-height: 100vh;
      }
      .topbar {
        grid-column: 1/-1;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 14px;
        position: sticky;
        top: 0;
        z-index: 200;
      }
      .topbar-logo {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: 0.1em;
        background: linear-gradient(135deg, #38bdf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .topbar-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text2);
      }
      .topbar-badge {
        margin-left: auto;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 4px;
        padding: 3px 10px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text3);
      }
      .sidebar {
        background: var(--bg2);
        border-right: 1px solid var(--border);
        overflow-y: auto;
      }
      .sidebar-section {
        padding: 14px 14px 6px;
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text3);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .scenario-item {
        padding: 8px 14px;
        cursor: pointer;
        border-left: 2px solid transparent;
        transition: all 0.12s;
      }
      .scenario-item:hover {
        background: var(--bg3);
        border-left-color: var(--border2);
      }
      .scenario-item.active {
        background: var(--bg3);
        border-left-color: var(--blue);
      }
      .sc-depot {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 2px;
      }
      .sc-meta {
        font-size: 10px;
        color: var(--text3);
        font-family: var(--font-mono);
      }
      .sc-src {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 2px;
        font-size: 9px;
        font-family: var(--font-mono);
        font-weight: 700;
        margin-right: 4px;
      }
      .c1 {
        background: #0d1f0d;
        color: #4ade80;
      }
      .c2 {
        background: #0d0d1f;
        color: #c084fc;
      }
      .main {
        overflow-y: auto;
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }
      .tab-bar {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
        flex-shrink: 0;
      }
      .tab {
        padding: 13px 18px;
        font-size: 12px;
        font-weight: 700;
        color: var(--text3);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.12s;
        font-family: var(--font-mono);
        letter-spacing: 0.06em;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--blue);
        border-bottom-color: var(--blue);
      }
      .content {
        padding: 20px;
        flex: 1;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px;
        border-top-width: 2px;
      }
      .stat-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text3);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
      }
      .stat-sub {
        font-size: 10px;
        color: var(--text3);
        margin-top: 3px;
      }
      .map-section {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      .map-header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .map-header-title {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 700;
        color: var(--text);
      }
      .map-container {
        height: 400px;
        position: relative;
      }
      #leaflet-map {
        height: 100%;
        width: 100%;
      }
      .map-legend {
        position: absolute;
        bottom: 10px;
        left: 10px;
        z-index: 1000;
        background: rgba(10, 12, 16, 0.9);
        border: 1px solid var(--border2);
        border-radius: 5px;
        padding: 8px 10px;
        backdrop-filter: blur(4px);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 10px;
        color: var(--text2);
        font-family: var(--font-mono);
        margin-bottom: 4px;
      }
      .legend-item:last-child {
        margin-bottom: 0;
      }
      .legend-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .routes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }
      .route-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
      }
      .route-card-header {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
      }
      .vehicle-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 3px;
      }
      .route-card-title {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 1px;
      }
      .route-card-meta {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text3);
      }
      .util-bar-wrap {
        margin-top: 7px;
      }
      .util-label {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: var(--text3);
        font-family: var(--font-mono);
        margin-bottom: 3px;
      }
      .util-bar {
        height: 3px;
        background: var(--bg4);
        border-radius: 2px;
        overflow: hidden;
      }
      .util-fill {
        height: 100%;
        border-radius: 2px;
      }
      .charts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 16px;
      }
      .chart-card,
      .chart-card-full {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px;
        margin-bottom: 14px;
      }
      .chart-title {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        color: var(--text3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .comp-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }
      .comp-table th {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      .comp-table td {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        color: var(--text2);
      }
      .comp-table tr:hover td {
        background: var(--bg3);
      }
      .mono {
        font-family: var(--font-mono);
        color: var(--text) !important;
      }
      .ilp-notice {
        background: var(--bg3);
        border: 1px dashed var(--border2);
        border-radius: 6px;
        padding: 28px;
        text-align: center;
        margin-bottom: 20px;
      }
      .ilp-notice-title {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--yellow);
        margin-bottom: 6px;
      }
      .ilp-notice-sub {
        font-size: 12px;
        color: var(--text3);
        line-height: 1.7;
      }
      .empty-state {
        padding: 60px;
        text-align: center;
        color: var(--text3);
        font-family: var(--font-mono);
        font-size: 12px;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg2);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 3px;
      }
      .leaflet-container {
        background: #111318 !important;
      }
      .leaflet-tile {
        filter: brightness(0.65) saturate(0.4);
      }
      .leaflet-popup-content-wrapper {
        background: #181c24;
        color: #e8eaf0;
        border: 1px solid #363c4e;
        border-radius: 6px;
        font-family: "Space Mono", monospace;
        font-size: 11px;
      }
      .leaflet-popup-tip {
        background: #181c24;
      }

      ];
      const VEHICLE_COLORS = {
        "Blind Van": "#38bdf8",
        "Pickup Bak": "#4ade80",
        "Engkel (CDE)": "#fb923c",
        "CDD Box": "#c084fc",
      };

      const { useState, useEffect, useRef, useMemo, useCallback } = React;
      const {
        BarChart,
        Bar,
        XAxis,
        YAxis,
        CartesianGrid,
        Tooltip,
        Legend,
        LineChart,
        Line,
        ResponsiveContainer,
        Cell,
      } = Recharts;

      const fmtKm = (v) => (Math.round(v * 10) / 10).toLocaleString() + " km";
      const fmtRp = (v) => "Rp " + Math.round(v).toLocaleString("id-ID");
      const fmtPct = (v) => Math.round(v * 10) / 10 + "%";
      const fmtS = (v) => Math.round(v * 100) / 100 + "s";

      /* ── Leaflet Map ─────────────────────────────── */
      function LeafletMap({ scenario }) {
        const mapInst = useRef(null);
        const layersRef = useRef([]);
        const containerRef = useRef(null);

        useEffect(() => {
          if (!mapInst.current) {
            mapInst.current = L.map("leaflet-map", {
              zoomControl: true,
              attributionControl: false,
            });
            L.tileLayer(
              "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
              { maxZoom: 18 },
            ).addTo(mapInst.current);
          }
          layersRef.current.forEach((l) => mapInst.current.removeLayer(l));
          layersRef.current = [];
          if (!scenario) return;

          const bounds = [];
          const dp = [scenario.depot_lat, scenario.depot_lng];
          bounds.push(dp);

          const depotIcon = L.divIcon({
            html: '<div style="width:14px;height:14px;background:#fbbf24;border:2px solid #fff;border-radius:50%;box-shadow:0 0 10px #fbbf24aa"></div>',
            className: "",
            iconAnchor: [7, 7],
          });
          const dm = L.marker(dp, { icon: depotIcon }).bindPopup(
            "<b>DEPOT</b><br>" + scenario.depot,
          );
          dm.addTo(mapInst.current);
          layersRef.current.push(dm);

          const vColors = Object.values(VEHICLE_COLORS);
          scenario.routes.forEach((route, ri) => {
            const color =
              VEHICLE_COLORS[route.vehicle_type] ||
              vColors[ri % vColors.length];
            const stopLL = route.stops.map((s) => [s.lat, s.lng]);
            const lineCoords = [dp, ...stopLL, dp];
            const pl = L.polyline(lineCoords, {
              color,
              weight: 2.5,
              opacity: 0.8,
            });
            pl.addTo(mapInst.current);
            layersRef.current.push(pl);
            route.stops.forEach((stop, si) => {
              bounds.push([stop.lat, stop.lng]);
              const icon = L.divIcon({
                html:
                  '<div style="width:8px;height:8px;background:' +
                  color +
                  ';border:1.5px solid rgba(255,255,255,.4);border-radius:50%;"></div>',
                className: "",
                iconAnchor: [4, 4],
              });
              const sm = L.marker([stop.lat, stop.lng], { icon }).bindPopup(
                "<b>" +
                  stop.awb_id +
                  "</b><br>" +
                  route.vehicle_type +
                  " #" +
                  (ri + 1) +
                  "<br>Stop " +
                  (si + 1) +
                  "/" +
                  route.stops.length +
                  "<br>" +
                  stop.weight +
                  " kg · " +
                  stop.volume +
                  " CBM",
              );
              sm.addTo(mapInst.current);
              layersRef.current.push(sm);
            });
          });
          if (bounds.length > 1)
            mapInst.current.fitBounds(bounds, { padding: [32, 32] });
        }, [scenario]);

        return React.createElement("div", { id: "leaflet-map" });

                },
                "ROUTE MAP",
              ),
              React.createElement(
                "div",
                {
                  className: "tab" + (tab === "analytics" ? " active" : ""),
                  onClick: () => setTab("analytics"),
                },
                "ANALYTICS",
              ),
            ),
            tab === "routes" && React.createElement(ScenarioView, { scenario }),
            tab === "analytics" && React.createElement(AnalyticsView),
          ),
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        React.createElement(App),
      );
    </script>
  </body>
</html>
